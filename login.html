<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biored - Acceder</title>
    <link rel="stylesheet" href="css/estilo.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>🌿 BIORED</h1>
        <div class="tagline">Accede a tu cuenta</div>
    </header>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Iniciar sesión</h2>
            <div id="message" style="display: none;"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••">
            </div>
            <button id="loginBtn" class="btn" style="width: 100%;">Ingresar</button>

            <hr style="margin: 1.5rem 0;">

            <h3>¿Nuevo en Biored?</h3>
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="emailReg" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña (mínimo 6 caracteres)</label>
                <input type="password" id="passwordReg" placeholder="••••••">
            </div>
            <button id="registerBtn" class="btn btn-outline" style="width: 100%;">Crear cuenta</button>

            <div style="margin-top: 1rem; text-align: center;">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </div>
    </div>
    <footer>
        Biored – Red Viva | contacto@biored.coop
    </footer>
    <script src="js/auth.js"></script>
    <script>
        // Reasignar elementos porque los IDs son diferentes en registro
        document.addEventListener('DOMContentLoaded', () => {
            // Sobrescribir los elementos globales de auth.js con los de esta página
            window.emailInput = document.getElementById('email');
            window.passwordInput = document.getElementById('password');
            window.nombreInput = document.getElementById('nombre');
            // Para registro usaremos otros campos, pero auth.js espera emailInput, passwordInput, nombreInput
            // Modificamos temporalmente: cuando se haga register, tomamos de los campos específicos
            const originalHandleRegister = window.handleRegister;
            window.handleRegister = async () => {
                const email = document.getElementById('emailReg').value.trim();
                const password = document.getElementById('passwordReg').value;
                const nombre = document.getElementById('nombre').value.trim();
                if (!email || !password || !nombre) {
                    window.showMessage('Completa todos los campos');
                    return;
                }
                if (password.length < 6) {
                    window.showMessage('La contraseña debe tener al menos 6 caracteres');
                    return;
                }
                try {
                    const { data: authData, error: authError } = await window.supabase.auth.signUp({
                        email, password,
                        options: { data: { nombre, rol: 'externo' } }
                    });
                    if (authError) throw authError;
                    const { error: insertError } = await window.supabase
                        .from('usuarios')
                        .insert([{ id: authData.user.id, email, nombre, rol: 'externo' }]);
                    if (insertError) throw insertError;
                    window.showMessage('Registro exitoso. Ya puedes iniciar sesión.', false);
                    document.getElementById('emailReg').value = '';
                    document.getElementById('passwordReg').value = '';
                    document.getElementById('nombre').value = '';
                } catch (error) {
                    window.showMessage('Error: ' + error.message);
                }
            };
            // Reemplazar el botón de registro
            const registerBtn = document.getElementById('registerBtn');
            if (registerBtn) registerBtn.onclick = window.handleRegister;
        });
    </script>
</body>
</html>
